<!DOCTYPE html>
<html>
<head>
    <title>Barber Shop</title>
</head>
<body>
    <h1>Welcome to Our Barber Shop</h1>
    
    <h2>Our Barbers</h2>
    <ul>
        {% for barber in barbers %}
            <li>
                <strong>{{ barber.name }}</strong> - {{ barber.experience }} years of experience
                <p>{{ barber.bio }}</p>
            </li>
        {% empty %}
            <li>No barbers available right now.</li>
        {% endfor %}
    </ul>

    <a href="{% url 'book_appointment' %}">
        <button>Book an Appointment</button>
    </a>
</body>
</html>
